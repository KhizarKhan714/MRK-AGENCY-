<!DOCTYPE html>
<html>
<head>
    <title>MRK Agency - CEO Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 60%);
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255,215,0,0.04) 0%, transparent 50%);
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255,215,0,0.1);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        nav .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 700;
            color: #FFD700;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        nav a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        nav a:hover { color: #FFD700; }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .top-badge {
            text-align: center;
            margin-bottom: 40px;
        }

        .top-badge .line {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .top-badge .line::before,
        .top-badge .line::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
        }

        .top-badge .diamond {
            color: #FFD700;
            font-size: 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .top-badge h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 2px;
            line-height: 1;
        }

        .top-badge h1 span { color: #FFD700; }

        .top-badge p {
            margin-top: 10px;
            font-size: 10px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
        }

        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 2px;
            padding: 45px 40px;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 1px;
            background: #FFD700;
        }

        .error {
            background: rgba(180,0,0,0.15);
            border: 1px solid rgba(255,50,50,0.3);
            color: #ff6666;
            padding: 12px 16px;
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-align: center;
        }

        .field {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,215,0,0.6);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 13px 16px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
            border-radius: 0;
        }

        input:focus {
            border-color: rgba(255,215,0,0.6);
            background: rgba(255,215,0,0.03);
        }

        input::placeholder {
            color: rgba(255,255,255,0.15);
            font-size: 12px;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: linear-gradient(135deg, #FFA500, #FFD700);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.1);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MRK Agency</div>
        <a href="/">Return</a>
    </nav>

    <div class="container">
        <div class="top-badge">
            <div class="line"><span class="diamond">◆ Restricted Access ◆</span></div>
            <h1>CEO <span>Portal</span></h1>
            <p>Authorized Personnel Only</p>
        </div>

        <div class="card">
            {% if error %}
            <div class="error">⚠ {{ error }}</div>
            {% endif %}

            <form method="POST" action="/ceo-login">
                <div class="field">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" autocomplete="off">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="CEO password">
                </div>
                <div class="field">
                    <label>Secret Key</label>
                    <input type="password" name="secret_key" placeholder="Secret key">
                </div>
                <div class="field">
                    <label>Security Answer</label>
                    <input type="text" name="security_answer" placeholder="Security answer">
                </div>
                <button type="submit" class="btn">Enter Portal</button>
            </form>
        </div>

        <p class="footer-text">MRK Agency &nbsp;·&nbsp; Confidential</p>
    </div>
</body>
    </html>
