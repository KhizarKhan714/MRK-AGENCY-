<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRK Agency — Contractor Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #F8F9FB; --surface: #FFFFFF; --dark: #0A0F1E;
            --blue: #1A56DB; --blue-dark: #1240A8; --blue-soft: #EEF3FF;
            --border: #E2E8F0; --text: #0A0F1E; --muted: #64748B;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        nav {
            background: var(--dark); height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 48px; border-bottom: 2px solid var(--blue);
        }
        .nav-logo { font-size: 18px; font-weight: 800; letter-spacing: 0.15em; color: #fff; text-decoration: none; }
        .nav-logo span { color: var(--blue); }
        nav a.nav-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; font-weight: 500; margin-left: 24px; transition: color 0.2s; }
        nav a.nav-link:hover { color: #fff; }

        .page { display: flex; align-items: center; justify-content: center; padding: 60px 20px; min-height: calc(100vh - 64px); }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 48px; width: 100%; max-width: 420px;
            box-shadow: 0 4px 24px rgba(10,15,30,0.08);
            border-top: 3px solid var(--blue);
        }
        .card-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); margin-bottom: 12px; }
        .card h2 { font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
        .card-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
        .error {
            background: #FEF2F2; border: 1px solid #FECACA;
            color: #DC2626; padding: 12px 16px; border-radius: 6px;
            font-size: 13px; font-weight: 500; margin-bottom: 20px;
        }
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
        .field input {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--border); border-radius: 6px;
            font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
            background: var(--bg); transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); background: #fff; }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--blue);
            color: #fff; border: none; border-radius: 6px;
            font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { background: var(--blue-dark); }
        .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
        .card-footer { text-align: center; font-size: 14px; color: var(--muted); }
        .card-footer a { color: var(--blue); font-weight: 600; text-decoration: none; }
        .cin-hint {
            background: var(--blue-soft); border-radius: 6px; padding: 12px 14px;
            font-size: 12px; color: var(--blue); margin-bottom: 20px; line-height: 1.5;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">MRK<span></span>Agency</a>
        <div>
            <a href="/" class="nav-link">Home</a>
            <a href="/contractor-apply" class="nav-link">Apply</a>
        </div>
    </nav>

    <div class="page">
        <div class="card">
            <div class="card-eyebrow">Contractor Portal</div>
            <h2>Contractor Login</h2>
            <p class="card-sub">Enter your CIN and password to access your dashboard.</p>
            <div class="cin-hint">Your CIN (Contractor ID) is issued by the CEO upon approval of your application. Format: MRK followed by 5 digits.</div>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form method="POST" action="/contractor-login">
                <div class="field">
                    <label>CIN — Contractor ID</label>
                    <input type="text" name="cin" placeholder="e.g. MRK12345" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn-primary">Access Dashboard</button>
            </form>
            <hr class="divider">
            <div class="card-footer">Not yet a contractor? <a href="/contractor-apply">Apply here</a></div>
        </div>
    </div>
</body>
                                                                              </html>
